<section class="brands-section">
  <div class="section-head">
    <span class="section-label">04 / BRANDS</span>
  </div>
  <div class="brands-strip">
    @for (brand of brands; track brand) {
      <div class="brand-item">
        <img [src]="brand" alt="Brand" loading="lazy" />
      </div>
    }
  </div>
</section>
