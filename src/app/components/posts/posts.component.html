<section class="posts-section">
  <div class="section-head">
    <h2 class="section-label">03 / POSTS</h2>
  </div>
  <div class="posts-grid">
    @for (post of posts; track post; let i = $index) {
      <figure class="post-card" [class.featured]="i === 0 || i === 7">
        <img [src]="post" loading="lazy" alt="" />
      </figure>
    }
  </div>
</section>
