<section class="hero">
  <div class="video-wrap">
    <video #heroVideo
           [src]="isMobile ? 'assets/reels/best-real/IMG_5386.MOV' : 'assets/reels/best-real/IMG_5607.mp4'"
           autoplay muted playsinline preload="auto" loop
           class="hero-video"></video>
    <div class="overlay"></div>
  </div>
  <div class="hero-content">
    <span class="hero-eyebrow">CONTENT CREATION · SOCIAL MEDIA · BRAND MANAGEMENT</span>
    <h1 class="hero-title"><em>SK.</em>SOCIAL</h1>
    <p class="hero-name">SARAI KROTOVICH</p>
  </div>
  <div class="scroll-hint">
    <span class="scroll-word">SCROLL</span>
    <div class="scroll-line"></div>
  </div>
</section>
